---
layout: default
---
<div class="container">
  <article>
    <header class="post-header">
      <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
        {% if page.category %}<span class="category">{{ page.category }}</span>{% endif %}
        {% if page.author %}<span>{{ page.author }}</span>{% endif %}
      </div>
      <h1>{{ page.title }}</h1>
    </header>

    {% if page.featured_image %}
      <img class="post-featured-image" src="{{ page.featured_image | relative_url }}" alt="{{ page.title }}">
    {% endif %}

    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
