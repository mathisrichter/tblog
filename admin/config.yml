backend:
  name: github
  repo: YOUR-GITHUB-USERNAME/YOUR-REPO-NAME  # TODO: update before deploying
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "posts"
    label: "Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title",          name: "title",          widget: "string" }
      - { label: "Date",           name: "date",           widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Author",         name: "author",         widget: "string",   required: false }
      - { label: "Category",       name: "category",       widget: "select",   options: ["review", "festival", "essay", "interview"] }
      - { label: "Tags",           name: "tags",           widget: "list",     required: false }
      - { label: "Featured Image", name: "featured_image", widget: "image",    required: false }
      - { label: "Excerpt",        name: "excerpt",        widget: "text",     required: false }
      - { label: "Body",           name: "body",           widget: "markdown" }

  - name: "pages"
    label: "Pages"
    files:
      - name: "about"
        label: "About"
        file: "about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body",  name: "body",  widget: "markdown" }
